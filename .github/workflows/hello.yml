# Workflow name (No indentation required)
name: Hello

# Defines when the workflow will run
on:
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:

# Jobs define what the workflow should do
jobs:

  # First Job
  say-hello:

    # Creates an ephemeral Ubuntu runner (temporary virtual machine)
    # GitHub starts it when the job begins and destroys it after completion
    runs-on: ubuntu-latest

    # Steps define the tasks to execute inside the job
    steps:

      # Run a shell command
      - name: Say hello to Everyone
        run: echo "Hello Dosto"

      # Example of an Action
      # Actions are reusable pieces of code
      # - name: Checkout Repository
      #   uses: actions/checkout@v4

# Notes:
#
# Workflow
# ├── name
# ├── on
# └── jobs
#
# Job
# ├── runs-on
# └── steps
#
# Step
# ├── run   (execute shell commands)
# └── uses  (execute GitHub Actions)
#
# Structure:
#
# Workflow
# └── Jobs
#     └── Job
#         └── Steps
#             ├── run
#             └── uses
