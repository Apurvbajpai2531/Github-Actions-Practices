name: Pull Request Check

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  pr-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Display PR Information
        run: |
          echo "Pull Request Check Running"
          echo "Branch: ${{ github.head_ref }}"